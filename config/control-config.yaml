spin_survey:
  angular_velocity: 0.3       # rad/s
  total_angle: 6.2832         # radians (2π = full 360°)
  step_angle_rad: 0.872       # 50° per step, slightly less than ~55° HFOV
  pause_s: 1.0                # seconds to pause at each step for sharp frames
  pass_count: 1               # number of full passes
  pass_offset_rad: 0.0        # 0.0 = auto-compute as step_angle_rad/2

linear_speed: 0.2
angular_speed: 1.5
stress_test_rotation_speed: 0.5
linear_min: -0.5
linear_max: 0.8
angular_min: -1.0
angular_max: 2.0
log_dir: logs
map_name: exp1
dry_run: false
control_dir: ~/.control
launch_templates:
  nav_lino:
    name: nav2_bringup
    command: ros2 launch linorobot2_navigation navigation.launch.py
    description: Nav2 launched from linorobot2
    default_params:
      sim: 'false'
      map: basement.yaml
      rviz: 'false'
      config: navigation.yaml
  slam_lino:
    name: slam_toolbox
    command: ros2 launch linorobot2_navigation slam.launch.py
    description: Slam launched from linorobot2
    default_params:
      sim: 'false'
      rviz: 'false'
  nav:
    name: bl_nav
    command: bl dome navigation_bl.launch.py
    description: Better launch Dome naviation
  fox:
    name: Foxglove
    command: ros2 launch foxglove_bridge foxglove_bridge_launch.xml
    description: Foxglove driver
  robot:
    name: control_robot
    command: bl dome_control robot.launch.py
    description: Control robot-side nodes
  remote:
    name: control_remote
    command: bl dome_control remote.launch.py
    description: Control remote-side nodes
